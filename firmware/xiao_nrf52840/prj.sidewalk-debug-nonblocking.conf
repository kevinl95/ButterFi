# Sidewalk/Bluetooth enabled for the USB control debug build.

CONFIG_SIDEWALK=y
CONFIG_SIDEWALK_DFU=n
CONFIG_SIDEWALK_SUBGHZ_SUPPORT=n

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="ButterFi"
CONFIG_BT_DEVICE_NAME_DYNAMIC=n

CONFIG_USB_DEVICE_PRODUCT="ButterFi DBG14"
CONFIG_USB_DEVICE_PID=0x000E