# ButterFi prj.conf
# nRF Connect SDK / Zephyr configuration

# ── Bluetooth disabled by default; Sidewalk builds override in overlay conf ─
CONFIG_BT=n

# ── USB CDC-ACM (provisioning serial interface) ─────────────────────────────
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_USB_DEVICE_MANUFACTURER="ButterFi"
CONFIG_USB_DEVICE_PRODUCT="ButterFi"
CONFIG_USB_DEVICE_PID=0x000A
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_LOG_BACKEND_UART=n

# ── NVS (config storage) ────────────────────────────────────────────────────
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_JSON_LIBRARY=y

# ── Logging ─────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_SERIAL=y

# ── System ──────────────────────────────────────────────────────────────────
CONFIG_REBOOT=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

