# ButterFi prj.conf
# nRF Connect SDK / Zephyr configuration

# ── Sidewalk ────────────────────────────────────────────────────────────────
CONFIG_SIDEWALK=y
CONFIG_SIDEWALK_DFU=n
# FSK/LoRa not available on XIAO nRF52840 (BLE-only certification)
CONFIG_SIDEWALK_SUBGHZ_SUPPORT=n

# ── Bluetooth ───────────────────────────────────────────────────────────────
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="ButterFi"
CONFIG_BT_DEVICE_NAME_DYNAMIC=n

# ── USB CDC-ACM (provisioning serial interface) ─────────────────────────────
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_USB_DEVICE_MANUFACTURER="ButterFi"
CONFIG_USB_DEVICE_PRODUCT="ButterFi Dongle"
CONFIG_USB_DEVICE_PID=0x0001

# ── NVS (config storage) ────────────────────────────────────────────────────
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# ── Logging ─────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_SERIAL=y

# ── System ──────────────────────────────────────────────────────────────────
CONFIG_REBOOT=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

