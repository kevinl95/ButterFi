# Sidewalk/Bluetooth enabled for the USB control debug build with CONFIG_ASSERT
# enabled, secondary assert-coupled defaults forced to the known-good values,
# and a custom Bluetooth controller assert handler to capture the failing file/line.

CONFIG_SIDEWALK=y
CONFIG_SIDEWALK_DFU=n
CONFIG_SIDEWALK_SUBGHZ_SUPPORT=n

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="ButterFi"
CONFIG_BT_DEVICE_NAME_DYNAMIC=n
CONFIG_BT_CTLR_ASSERT_HANDLER=y

CONFIG_ASSERT=y
CONFIG_MEM_SLAB_POINTER_VALIDATE=n
CONFIG_SYSTEM_WORKQUEUE_WORK_TIMEOUT_MS=0
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=768
CONFIG_LOG_BACKED_RPC_CRASH_INFO_FILENAME_SIZE=1

CONFIG_USB_DEVICE_PRODUCT="ButterFi DBG19"
CONFIG_USB_DEVICE_PID=0x0013