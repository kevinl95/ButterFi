# Sidewalk module/code included, but CONFIG_SIDEWALK kept disabled.
# Bluetooth stays enabled so this profile differs from DBG12 only by
# Sidewalk code/module presence, not by the BLE stack.

CONFIG_SIDEWALK=n

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="ButterFi"
CONFIG_BT_DEVICE_NAME_DYNAMIC=n

CONFIG_USB_DEVICE_PRODUCT="ButterFi DBG13"
CONFIG_USB_DEVICE_PID=0x000D